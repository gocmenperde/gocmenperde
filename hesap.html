<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Müşteri Paneli - Göçmen Perde</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .form-box { max-width: 300px; margin-bottom: 20px; border: 1px solid #ccc; padding: 15px; border-radius: 8px; }
        input { display: block; width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="kayitBolumu" class="form-box">
        <h3>Yeni Kayıt</h3>
        <input type="text" id="kayitAd" placeholder="Ad Soyad">
        <input type="email" id="kayitEmail" placeholder="E-posta">
        <input type="text" id="kayitTel" placeholder="Telefon (05xx)">
        <input type="password" id="kayitSifre" placeholder="Şifre">
        <button onclick="kayitOl()">Kayıt Ol</button>
    </div>

    <script>
        async function kayitOl() {
    const buton = document.querySelector('button');
    buton.innerText = 'İşleniyor...';
    
    try {
        const veri = {
            action: 'register',
            ad_soyad: document.getElementById('kayitAd').value,
            email: document.getElementById('kayitEmail').value,
            telefon: document.getElementById('kayitTel').value,
            sifre: document.getElementById('kayitSifre').value
        };

        const cevap = await fetch('/api/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(veri)
        });

        const sonuc = await cevap.json();
        
        if (sonuc.success) {
            alert('Hoş geldin ' + sonuc.user.ad_soyad + '! Kaydın tamamlandı.');
            location.reload(); // Sayfayı yenile
        } else {
            alert('Hata: ' + sonuc.error);
        }
    } catch (err) {
        alert('Bağlantı hatası: API sunucusuna ulaşılamadı.');
    } finally {
        buton.innerText = 'Kayıt Ol';
    }
}

    </script>
    <script>
// Sayfa açıldığında URL'ye bak (login mi register mı?)
const urlParams = new URLSearchParams(window.location.search);
const mod = urlParams.get('mod');

if (mod === 'login') {
    document.querySelector('h2').innerText = 'Giriş Yap';
    document.querySelector('button').innerText = 'Giriş Yap';
    // Ad Soyad ve Telefon alanlarını gizle (Sadece Email ve Şifre kalsın)
    document.querySelectorAll('input')[0].style.display = 'none'; // Ad Soyad
    document.querySelectorAll('input')[2].style.display = 'none'; // Telefon
}
</script>
<script>
const params = new URLSearchParams(window.location.search);
if (params.get('mod') === 'login') {
    document.querySelector('h3').innerText = 'Giriş Yap';
    document.querySelector('button').innerText = 'Giriş Yap';
    // Kayıt için gereken gereksiz alanları gizle
    document.getElementById('kayitAd').style.display = 'none';
    document.getElementById('kayitTel').style.display = 'none';
}
</script>

</body>
</html>
